services:
  oura-reader:
    build: .
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      - oura-data:/data
      - ./secrets:/run/secrets:ro
    environment:
      - OURA_LISTEN_ADDR=0.0.0.0:8080
      - OURA_FETCH_INTERVAL=6h
      - OURA_BASE_URL=https://ivans-mac-mini.tail111a35.ts.net

volumes:
  oura-data:
